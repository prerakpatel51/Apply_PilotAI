<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <title>ApplyPilot AI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="description" content="AI job-search copilot. Discover roles, rank fit, and generate tailored LaTeX resumes per JD." />
    <meta property="og:title" content="ApplyPilot AI" />
    <meta property="og:description" content="AI job-search copilot. Discover, rank, and tailor your resume per JD." />
    <meta property="og:image" content="/apple-touch-icon.svg" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script>
      // Bootstrap theme before paint to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored || (prefersDark ? "dark" : "light");
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-bg text-fg antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
