services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      BACKEND_CORS_ORIGINS: ${PUBLIC_ORIGIN}
      FRONTEND_URL: ${PUBLIC_ORIGIN}
      RATE_LIMIT_PER_MINUTE: "120"
      SEARCH_RUNS_PER_HOUR: "10"
      LOGIN_FAIL_LIMIT: "5"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      STORAGE_BACKEND: local
      STORAGE_DIR: /app/storage
      COMPILE_DISPATCH: local
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["arq", "app.worker.WorkerSettings"]
    healthcheck:
      disable: true
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      BACKEND_CORS_ORIGINS: ${PUBLIC_ORIGIN}
      STORAGE_BACKEND: local
      STORAGE_DIR: /app/storage
      COMPILE_DISPATCH: local
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
  backend_storage:
  caddy_data:
  caddy_config:
